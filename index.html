  sub:(a,b)=>({x:a.x-b.x,y:a.y-b.y}),
  mul:(a,s)=>({x:a.x*s,y:a.y*s}),
  dot:(a,b)=>a.x*b.x+a.y*b.y,
  len:a=>Math.hypot(a.x,a.y),
  norm:a=>{const l=Math.hypot(a.x,a.y)||1;return{x:a.x/l,y:a.y/l};},
  reflect:(v,n)=>{const d=v.x*n.x+v.y*n.y;return{x:v.x-2*d*n.x,y:v.y-2*d*n.y};},

function isThemeIdValid(id){
  return Object.prototype.hasOwnProperty.call(THEME_PACKS, id);
}

function getActiveTheme(){
  return THEME_PACKS[settings.themeId] || THEME_PACKS[DEFAULT_THEME_ID];
}

function isGameplayModeIdValid(id){
  return Object.prototype.hasOwnProperty.call(GAMEPLAY_MODES, id);
}

function getActiveMode(){
  return GAMEPLAY_MODES[settings.gameplayModeId] || GAMEPLAY_MODES[DEFAULT_GAMEPLAY_MODE_ID];
}

function setGameplayModeId(id){
  if (!isGameplayModeIdValid(id)) return false;
  settings.gameplayModeId = id;
  saveSettings();
  return true;
}

function applyGameplayModeFromMenu(id){
  if (!canApplyMenuSetting()) return false;
  return setGameplayModeId(id);
}

function saveSettings(){
  localStorage.setItem(THEME_STORAGE_KEY, settings.themeId);
  localStorage.setItem(SOUND_STORAGE_KEY, String(settings.soundEnabled));
  localStorage.setItem(GAMEPLAY_MODE_STORAGE_KEY, settings.gameplayModeId);
}

function loadSettings(){
  const rawTheme = localStorage.getItem(THEME_STORAGE_KEY);
  const rawSound = localStorage.getItem(SOUND_STORAGE_KEY);
  const rawMode  = localStorage.getItem(GAMEPLAY_MODE_STORAGE_KEY);

  settings.themeId = isThemeIdValid(rawTheme) ? rawTheme : DEFAULT_THEME_ID;
  const soundValid = rawSound === 'true' || rawSound === 'false';
  settings.soundEnabled = soundValid ? rawSound === 'true' : true;
  settings.gameplayModeId = isGameplayModeIdValid(rawMode) ? rawMode : DEFAULT_GAMEPLAY_MODE_ID;

  if (!isThemeIdValid(rawTheme)) localStorage.setItem(THEME_STORAGE_KEY, settings.themeId);
  if (!soundValid) localStorage.setItem(SOUND_STORAGE_KEY, String(settings.soundEnabled));
  if (!isGameplayModeIdValid(rawMode)) localStorage.setItem(GAMEPLAY_MODE_STORAGE_KEY, settings.gameplayModeId);
}

function setThemeId(nextId){
  if (!isThemeIdValid(nextId)) return false;
  settings.themeId = nextId;
  saveSettings();
  return true;
}

function setSoundEnabled(enabled){
  settings.soundEnabled = !!enabled;
  saveSettings();
}

// Swept circle (center p0, displacement d=v*dt, radius r) vs static segment [a,b].
// Returns { toi in [0,1], normal } or null. Normal points from segment toward circle.
function sweepCircleSegment(p0, d, r, a, b){
  const sx = b.x-a.x, sy = b.y-a.y;
  const segLen2 = sx*sx + sy*sy;
  if (segLen2 < 1e-6) return null;
  // Segment normal (left-hand)
  let nx = -sy, ny = sx;
  const nl = Math.hypot(nx,ny); nx/=nl; ny/=nl;
  // Ensure normal points toward the moving circle's start
  const side = (p0.x-a.x)*nx + (p0.y-a.y)*ny;
  if (side < 0){ nx=-nx; ny=-ny; }
  // Distance from start center to infinite line along normal
  const dist0 = (p0.x-a.x)*nx + (p0.y-a.y)*ny; // >= 0
  const vN = d.x*nx + d.y*ny; // signed motion along normal (negative = approaching)
  if (vN >= 0) return null;
  const toi = (dist0 - r) / (-vN);
  if (toi > 1) return null;
  // toi may be slightly negative when the ball already overlaps the line of the
  // segment (e.g. it just shaved past an endpoint corner the previous substep).
  // We still need to consider endpoints in that case — otherwise the ball can
  // tunnel through near the corner of a short segment like a slingshot.
  if (toi < 0){
    // If the projected contact point actually lies inside the segment body we
    // treat this as a real overlap and resolve at toi=0 with the line normal.
    const cxOv = p0.x, cyOv = p0.y;
    const tOv = ((cxOv-a.x)*sx + (cyOv-a.y)*sy) / segLen2;
    if (tOv >= 0 && tOv <= 1) return { toi: 0, normal:{x:nx,y:ny} };
    return sweepCircleEnd(p0,d,r,a) ?? sweepCircleEnd(p0,d,r,b);
  }
  // Contact point along segment axis
  const cx = p0.x + d.x*toi, cy = p0.y + d.y*toi;
  const t = ((cx-a.x)*sx + (cy-a.y)*sy) / segLen2;
  if (t < 0 || t > 1){
    // Check endpoints (circle vs point)
    return sweepCircleEnd(p0,d,r,a) ?? sweepCircleEnd(p0,d,r,b);
  }
  return { toi, normal:{x:nx,y:ny} };
}

function sweepCircleEnd(p0, d, r, q){
  // Circle of radius r centered at p0+d*t collides with point q
  const fx = p0.x - q.x, fy = p0.y - q.y;
  const A = d.x*d.x + d.y*d.y;
  const B = 2*(fx*d.x + fy*d.y);
  const C = fx*fx + fy*fy - r*r;
  if (A < 1e-9) return null;
  const disc = B*B - 4*A*C;
  if (disc < 0) return null;
  const t = (-B - Math.sqrt(disc)) / (2*A);
  if (t < 0 || t > 1) return null;
  const cx = p0.x + d.x*t, cy = p0.y + d.y*t;
  let nx = cx - q.x, ny = cy - q.y;
  const nl = Math.hypot(nx,ny)||1; nx/=nl; ny/=nl;
  return { toi:t, normal:{x:nx,y:ny} };
}

function sweepCircleArc(p0, d, r, c, R, a0, a1, outward=true){
  // Outward arc (ball outside circle of radius R-r at center c). Treat as circle vs circle.
  const target = outward ? (R + r) : (R - r);
  const fx = p0.x - c.x, fy = p0.y - c.y;
  const A = d.x*d.x + d.y*d.y;
  const B = 2*(fx*d.x + fy*d.y);
  const C = fx*fx + fy*fy - target*target;
  if (A < 1e-9) return null;
  const disc = B*B - 4*A*C;
  if (disc < 0) return null;
  const t = outward
    ? (-B - Math.sqrt(disc)) / (2*A)
    : (-B + Math.sqrt(disc)) / (2*A);
  const dist0 = Math.hypot(fx, fy);
  if (t < 0){
    if (dist0 > target + 1e-6) return null;
    let nx = fx, ny = fy;
    if (dist0 < 1e-6){ nx = 0; ny = -1; }
    else { nx /= dist0; ny /= dist0; }
    if (!outward){ nx = -nx; ny = -ny; }
    return { toi:0, normal:{x:nx,y:ny} };
  }
  if (t > 1) return null;
  const cx = p0.x + d.x*t, cy = p0.y + d.y*t;
  const ang = Math.atan2(cy - c.y, cx - c.x);
  const fullCircle = Math.abs(Math.abs(a1 - a0) - 2*Math.PI) < 1e-6;
  if (fullCircle){
    let nx = (cx - c.x), ny = (cy - c.y);
    const nl = Math.hypot(nx,ny)||1; nx/=nl; ny/=nl;
    if (!outward){ nx=-nx; ny=-ny; }
    return { toi:t, normal:{x:nx,y:ny} };
  }
  const norm = a => { a = a % (2*Math.PI); return a < 0 ? a + 2*Math.PI : a; };
  const A0 = norm(a0), A1 = norm(a1), AN = norm(ang);
  const inArc = A0 <= A1 ? (AN >= A0 && AN <= A1) : (AN >= A0 || AN <= A1);
  if (!inArc) return null;
  let nx = (cx - c.x), ny = (cy - c.y);
  const nl = Math.hypot(nx,ny)||1; nx/=nl; ny/=nl;
  if (!outward){ nx=-nx; ny=-ny; }
  return { toi:t, normal:{x:nx,y:ny} };
}

const segments = []; // { a, b, restitution, friction, kind, enabled? }

function addSegment(a, b, opts={}){
  segments.push({ a, b, restitution: opts.restitution ?? 0.55, friction: opts.friction ?? 0.02, kind: opts.kind ?? 'wall' });
}

const arcRegistry = []; // { c, R, a0, a1, outward, restitution }
function addArc(c, R, a0, a1, opts={}){
  arcRegistry.push({ c, R, a0, a1, outward: opts.outward ?? false, restitution: opts.restitution ?? 0.55 });
}

const bumperList = []; // { c, r, gain, value, flash, hits }
function addBumper(c, r, gain=1.6, value=100){ bumperList.push({c, r, gain, value, flash:0, hits:0}); }

const slingList = []; // { a, b, normal, gain, value, flash }
function addSling(a, b, gain=1.5, value=50){
  const sx = b.x-a.x, sy = b.y-a.y;
  let nx = -sy, ny = sx;
  const nl = Math.hypot(nx,ny)||1; nx/=nl; ny/=nl;
  slingList.push({ a, b, normal:{x:nx,y:ny}, gain, value, flash:0 });
  addSegment(a, b, { restitution: 0.7, kind:'sling' });
}

  bumperList.length = 0;

function serveBall(){
  ball.p = { x: 400, y: 680 };
  ball.v = { x: 0, y: 0 };
  state.phase = 'ready';
  state.spellJackpotBase = 5000;
  state.ballWasLaunched = false;
  state.saverUntil = performance.now()/1000 + 5;
}

function restartGame(){
  state.score = 0;
  state.balls = 3;
  state.mult = 1;
  state.comboCount = 0;
  state.comboUntil = 0;
  state.dropCycles = 0;
  state.saverUntil = performance.now()/1000 + 5;
  state.phase = 'ready';
  state.kickback = true;
  state.kickbackFlash = 0;
  state.bumperHits = 0;
  state.superBumpersUntil = 0;
  state.bumperChainCount = 0;
  state.bumperChainUntil = 0;
  state.extraBallAwarded = false;
  state.rightKickback = true;
  state.rightKickbackFlash = 0;
  state.spellJackpotBase = 5000;
  state.ballWasLaunched = false;
  topLanesZoneCooldown = false;
  floatTexts.length = 0;
  clearTable();
  buildTable();
  for (const f of [flippers.L, flippers.R, flippers.miniL].filter(Boolean)){
    f.angle = f.angleRest;
    f.angVel = 0;
    f.pressed = false;
  }
  serveBall();
}

function handleDrain(){
  if (ball.p.y <= CONFIG.H + 50) return;
  const nowSec = performance.now()/1000;
  dispatchThemeEvent('drain', { x:(DRAIN_LEFT + DRAIN_RIGHT)/2, y:CONFIG.H - 8 });
  if (state.saverUntil && nowSec < state.saverUntil){
    serveBall();
    return;
  }
  state.balls = Math.max(0, state.balls - 1);
  if (state.balls <= 0){
    state.phase = 'gameover';
    dispatchThemeEvent('game_over', { x: CONFIG.W/2, y: CONFIG.H/2 });
    if (state.score > state.hi) state.hi = state.score;
    ball.p = { x: -100, y: -100 };
    ball.v = { x: 0, y: 0 };
    return;
  }
  serveBall();
}

function registerScoreEvent(){
  state.comboCount += 1;
  state.comboUntil = performance.now()/1000 + 1.5;
  const prev = state.mult;
  if      (state.comboCount >= 12) state.mult = 4;
  else if (state.comboCount >=  7) state.mult = 3;
  else if (state.comboCount >=  3) state.mult = 2;
  else                             state.mult = 1;
  if (state.mult > prev){
    const lbl = ['','','x2 COMBO!','x3 COMBO!','x4 MEGA COMBO!'];
    spawnFloat(lbl[state.mult] || 'x'+state.mult, CONFIG.W/2, 380, '#fc4');
  }
}

function maybeAwardExtraBall(){
  if (state.extraBallAwarded || state.score < EXTRA_BALL_SCORE) return false;
  state.extraBallAwarded = true;
  state.balls += 1;
  spawnFloat('EXTRA BALL!', CONFIG.W/2, 320, '#5f5');
  spawnParticles(CONFIG.W/2, 320, 26, '#5f5');
  playThemeSound('ui_toggle');
  shake = Math.max(shake, 10);
  return true;
}

function applyScore(points){
  state.score += points;
  maybeAwardExtraBall();
}

function handleTopLanesComplete(){
  const mode = getActiveMode();
  const nowSec = performance.now()/1000;
  if (mode.onLaneComplete === 'multiplier'){
    if (state.mult < 4){
      state.mult += 1;
      spawnFloat('LANES! MULT x' + state.mult, CONFIG.W/2, 200, '#fc4');
    } else {
      applyScore(5000 * state.mult);
      spawnFloat('MAX MULT! +' + (5000 * state.mult), CONFIG.W/2, 200, '#fc4');
    }
    spawnParticles(CONFIG.W/2, 80, 20, '#fc4');
    dispatchThemeEvent('jackpot', { x: CONFIG.W/2, y: 80 });
    shake = Math.max(shake, 12);
  } else if (mode.onLaneComplete === 'points-burst'){
    const pts = 1000 * state.mult;
    applyScore(pts);
    spawnFloat('LANE BONUS +' + pts, CONFIG.W/2, 200, '#5cf');
    spawnParticles(CONFIG.W/2, 80, 20, '#5cf');
    dispatchThemeEvent('drop_clear', { x: CONFIG.W/2, y: 80 });
    shake = Math.max(shake, 8);
  } else if (mode.onLaneComplete === 'jackpot'){
    const pts = state.spellJackpotBase * state.mult;
    applyScore(pts);
    spawnFloat('N-E-O-N! +' + pts, CONFIG.W/2, 200, '#0ff');
    spawnParticles(CONFIG.W/2, 80, 30, '#0ff');
    dispatchThemeEvent('jackpot', { x: CONFIG.W/2, y: 80 });
    state.spellJackpotBase = Math.min(state.spellJackpotBase * 2, 80000);
    shake = Math.max(shake, 16);
  } else if (mode.onLaneComplete === 'super-all'){
    state.superBumpersUntil = nowSec + 10;
    state.bumperChainCount = 0;
    spawnFloat('FRENZY! ALL SUPER!', CONFIG.W/2, 200, '#f3a');
    spawnParticles(CONFIG.W/2, 80, 40, '#f3a');
    dispatchThemeEvent('jackpot', { x: CONFIG.W/2, y: 80 });
    shake = Math.max(shake, 20);
  }
  for (const lane of topLaneList) lane.lit = false;
}

function bumperSuperActive(nowSec = performance.now()/1000){
  return state.superBumpersUntil > nowSec;
}

function registerBumperHit(bp, nowSec){
  bp.flash = 0.45;
  bp.hits += 1;
  state.bumperHits += 1;
  if (state.bumperChainUntil && nowSec > state.bumperChainUntil) state.bumperChainCount = 0;
  state.bumperChainCount += 1;
  state.bumperChainUntil = nowSec + 2.2;
  for (const other of bumperList){
    if (other === bp) continue;
    const dist = Math.hypot(other.c.x - bp.c.x, other.c.y - bp.c.y);
    if (dist <= 120) other.flash = Math.max(other.flash, 0.22);
  }
  if (state.bumperChainCount >= 3 && !bumperSuperActive(nowSec)){
    state.superBumpersUntil = nowSec + 8;
    state.bumperChainCount = 0;
    spawnFloat('SUPER BUMPERS!', CONFIG.W/2, 286, '#0ff');
    spawnParticles(CONFIG.W/2, 250, 36, '#0ff');
    shake = Math.max(shake, 16);
  }
}

function physicsStep(dt){
  flippers.L.pressed = input.L;
  flippers.R.pressed = input.R;
  if (flippers.miniL) flippers.miniL.pressed = input.L;
  const nowSec = performance.now()/1000;
  for (const dp of dropList){ if (dp.down && dp.downUntil && nowSec >= dp.downUntil){ dp.down = false; dp.downUntil = 0; } }
  if (state.comboUntil && nowSec > state.comboUntil){
    state.comboCount = 0;
    state.comboUntil = 0;
    state.mult = 1;
  }
  flipperStep(dt);
  if (gateSeg) gateSeg.enabled = !(ball.p.x > SHOOTER_X && ball.v.y < 0);
  // Integrate forces
  ball.v.y += CONFIG.GRAVITY * dt;
  const drag = Math.pow(CONFIG.DRAG_PER_SEC, dt * 240);
  ball.v.x *= drag; ball.v.y *= drag;

  let remaining = 1.0;
  for (let iter = 0; iter < 6 && remaining > 1e-4; iter++){
    const d = { x: ball.v.x * dt * remaining, y: ball.v.y * dt * remaining };
    let best = null;
    for (const s of segments){
      if (s.enabled === false) continue;
      const hit = sweepCircleSegment(ball.p, d, ball.r, s.a, s.b);
      if (hit && (!best || hit.toi < best.toi)){ best = hit; best.surface = s; }
    }
    for (const a of arcRegistry){
      const hit = sweepCircleArc(ball.p, d, ball.r, a.c, a.R, a.a0, a.a1, a.outward);
      if (hit && (!best || hit.toi < best.toi)){ best = hit; best.surface = a; }
    }
    for (const f of [flippers.L, flippers.R, flippers.miniL].filter(Boolean)){
      const hit = flipperCollide(f, ball.p, d, ball.r);
      if (hit && (!best || hit.toi < best.toi)) best = { ...hit, surface: { kind:'flipper', restitution: 0.2 } };
    }
    for (const bp of bumperList){
      const hit = sweepCircleArc(ball.p, d, ball.r, bp.c, bp.r, 0, 2*Math.PI, true);
      if (hit && (!best || hit.toi < best.toi)) best = { ...hit, surface:{ kind:'bumper', restitution: 0.8 }, bumper: bp };
    }
    for (const dp of dropList){
      if (dp.down) continue;
      const a = { x: dp.c.x - dp.w/2, y: dp.c.y - dp.h/2 };
      const b = { x: dp.c.x + dp.w/2, y: dp.c.y - dp.h/2 };
      const hit = sweepCircleSegment(ball.p, d, ball.r, a, b);
      if (hit && (!best || hit.toi < best.toi)) best = { ...hit, surface:{ kind:'drop', restitution:0.3 }, drop: dp };
    }
    if (!best){
      ball.p.x += d.x; ball.p.y += d.y;
      remaining = 0;
      break;
    }
    if (best.flipper){
      const f = best.flipper;
      const eps = 1e-3;
      ball.p.x += d.x * Math.max(0, best.toi - eps);
      ball.p.y += d.y * Math.max(0, best.toi - eps);
      const arm = { x: ball.p.x - f.pivot.x, y: ball.p.y - f.pivot.y };
      const vSurf = { x: -arm.y * f.angVel, y: arm.x * f.angVel };
      const vRel = { x: ball.v.x - vSurf.x, y: ball.v.y - vSurf.y };
      const dn = vRel.x*best.normal.x + vRel.y*best.normal.y;
      const e = 1.05;
      const rx = vRel.x - (1+e)*dn*best.normal.x;
      const ry = vRel.y - (1+e)*dn*best.normal.y;
      ball.v.x = vSurf.x + rx;
      ball.v.y = vSurf.y + ry;
      ball.p.x += best.normal.x * 0.01;
      ball.p.y += best.normal.y * 0.01;
      if (best.penetration){
        ball.p.x += best.normal.x * best.penetration;
        ball.p.y += best.normal.y * best.penetration;
      }
      remaining *= (1 - best.toi);
      continue;
    }
    if (best.bumper){
      const bp = best.bumper;
      const eps = 1e-3;
      ball.p.x += d.x * Math.max(0, best.toi - eps);
      ball.p.y += d.y * Math.max(0, best.toi - eps);
      const superBumpers = bumperSuperActive(nowSec);
      const speed = Math.hypot(ball.v.x, ball.v.y);
      const inSpeed = Math.max(speed, 400);
      const outSpeed = Math.max(inSpeed * (bp.gain + (superBumpers ? 0.35 : 0)), superBumpers ? 780 : 600);
      ball.v.x = best.normal.x * outSpeed;
      ball.v.y = best.normal.y * outSpeed;
      ball.p.x += best.normal.x * 0.5;
      ball.p.y += best.normal.y * 0.5;
      registerBumperHit(bp, nowSec);
      dispatchThemeEvent('bumper_hit', { x: ball.p.x, y: ball.p.y });
      const bumperValue = bp.value + (superBumpers ? 350 : 0);
      applyScore(bumperValue * state.mult);
      registerScoreEvent();
      spawnParticles(ball.p.x, ball.p.y, superBumpers ? 30 : 22, superBumpers ? '#0ff' : '#5cf');
      if (superBumpers) spawnFloat('SUPER +' + (bumperValue * state.mult), bp.c.x, bp.c.y - 26, '#0ff');
      shake = superBumpers ? 14 : 10;
      if (state.bumperHits % 25 === 0){
        applyScore(10000 * state.mult);
        spawnFloat('JACKPOT! +10000', CONFIG.W/2, 240, '#f5a');
        spawnParticles(bp.c.x, bp.c.y, 40, '#f5a');
        dispatchThemeEvent('jackpot', { x: CONFIG.W/2, y: 240 });
        shake = 20;
      }
      remaining *= (1 - best.toi);
      continue;
    }
    if (best.drop){
      const dp = best.drop;
      const eps = 1e-3;
      ball.p.x += d.x * Math.max(0, best.toi - eps);
      ball.p.y += d.y * Math.max(0, best.toi - eps);
      const e = 0.3;
      const vn = ball.v.x * best.normal.x + ball.v.y * best.normal.y;
      ball.v.x -= (1 + e) * vn * best.normal.x;
      ball.v.y -= (1 + e) * vn * best.normal.y;
      ball.p.x += best.normal.x * 0.01;
      ball.p.y += best.normal.y * 0.01;
      dp.down = true;
      dp.downUntil = performance.now()/1000 + 3.5;
      applyScore(dp.value * state.mult);
      registerScoreEvent();
      spawnParticles(ball.p.x, ball.p.y, 8, '#fc4');
      dispatchThemeEvent('drop_clear', { x: ball.p.x, y: ball.p.y });
      if (dropList.every(d => d.down)){
        state.dropCycles += 1;
        const clearBonus = 1500 * Math.min(state.dropCycles, 6) * state.mult;
        applyScore(clearBonus);
        spawnFloat('DROP BONUS +' + clearBonus, CONFIG.W/2, 340, '#fc4');
        state.kickback = true; // rearm kickback on every bank clear
        state.rightKickback = true;
        for (const d of dropList){ d.down = false; d.downUntil = 0; }
      }
      remaining *= (1 - best.toi);
      continue;
    }
    const eps = 1e-3;
    ball.p.x += d.x * Math.max(0, best.toi - eps);
    ball.p.y += d.y * Math.max(0, best.toi - eps);
    const e = best.surface.restitution;
    const vn = ball.v.x * best.normal.x + ball.v.y * best.normal.y;
    const restThreshold = CONFIG.GRAVITY * dt * 2;
    const factor = (-vn < restThreshold) ? 1.0 : (1 + e);
    ball.v.x -= factor * vn * best.normal.x;
    ball.v.y -= factor * vn * best.normal.y;
    ball.p.x += best.normal.x * 0.01;
    ball.p.y += best.normal.y * 0.01;
    if (best.surface && best.surface.kind === 'sling'){
      const sl = slingList.find(s => s.a === best.surface.a || s.b === best.surface.b);
      if (sl){
        const speed = Math.hypot(ball.v.x, ball.v.y);
        const boost = Math.max(speed * (sl.gain - 1), 250);
        // Use the collision normal (always points away from the surface, toward
        // the ball) so the boost reliably pushes the ball off the sling instead
        // of into it.
        ball.v.x += best.normal.x * boost;
        ball.v.y += best.normal.y * boost;
        sl.flash = 0.15;
        dispatchThemeEvent('sling_hit', { x: ball.p.x, y: ball.p.y });
        applyScore(sl.value * state.mult);
        registerScoreEvent();
        spawnParticles(ball.p.x, ball.p.y, 10, '#f3a');
        shake = 5;
      }
    }
    remaining *= (1 - best.toi);
  }
  // Kickback: fires the ball back out of the left outlane when armed.
  if (state.kickback && ball.p.x > 2 && ball.p.x < 30 && ball.p.y > 550 && ball.p.y < 700){
    ball.p.x = KICKBACK_EJECT.x;
    ball.p.y = KICKBACK_EJECT.y;
    ball.v.x = KICKBACK_EJECT.vx;
    ball.v.y = KICKBACK_EJECT.vy;
    state.kickback = false;
    state.kickbackFlash = 0.8;
    spawnParticles(26, 620, 24, '#0ff');
    spawnFloat('KICKBACK!', 92, 540, '#0ff');
    shake = 12;
  }
  // Right kickback (symmetric to left)
  if (state.rightKickback && state.ballWasLaunched && ball.p.x > 393 && ball.p.x < 418 && ball.p.y > 550 && ball.p.y < 700 && ball.v.y > 0){
    ball.p.x = RIGHT_KICKBACK_EJECT.x;
    ball.p.y = RIGHT_KICKBACK_EJECT.y;
    ball.v.x = RIGHT_KICKBACK_EJECT.vx;
    ball.v.y = RIGHT_KICKBACK_EJECT.vy;
    state.rightKickback = false;
    state.rightKickbackFlash = 0.8;
    spawnParticles(RIGHT_KICKBACK_EJECT.x, 600, 24, '#0ff');
    spawnFloat('KICKBACK!', CONFIG.W - 88, 540, '#0ff');
    shake = 12;
  }
  handleDrain();
  // Top lane detection — zone extends to y<80 so balls placed/launched near y=70 register correctly.
  // Triggers on both upward and downward travel (standard pinball behaviour).
  if (ball.p.y > 24 && ball.p.y < 80){
    if (!topLanesZoneCooldown){
      for (const lane of topLaneList){
        if (!lane.lit && ball.p.x >= lane.xMin && ball.p.x <= lane.xMax){
          lane.lit = true;
          applyScore(100 * state.mult);
          registerScoreEvent();
          spawnFloat(lane.label ? lane.label + '!' : '+100', ball.p.x, 68, '#5cf');
          if (topLaneList.every(l => l.lit)){
            handleTopLanesComplete();
            topLanesZoneCooldown = true;
          }
          break;
        }
      }
    }
  } else {
    topLanesZoneCooldown = false;
  }
}

    });
  }
}

// ============ 5. FLIPPERS ============
const flippers = { L: null, R: null, miniL: null };
function makeFlipper(pivot, side){
  const restAngle = side==='L' ? 0.45 : Math.PI - 0.45;
  const upAngle   = side==='L' ? -0.45 : Math.PI + 0.45;
  return {
    pivot, side, length: 62, tipR: 7, baseR: 11,
    angle: restAngle, angleRest: restAngle, angleUp: upAngle,
    angVel: 0, state: 'rest',
    pressed: false,
  };
}

flippers.L = makeFlipper({x:135, y:620}, 'L');
flippers.R = makeFlipper({x:285, y:620}, 'R');

function makeMiniFlipperL(){
  // Pivot on left wall at top of left outlane (y=492, x=30)
  // Rest: angled right-downward (0.9 rad ≈ 52°, tip points right and slightly down)
  // Up: angled right-upward (−0.4 rad ≈ −23°, tip points right and up → deflects ball inward)
  return {
    pivot: { x: 30, y: 492 },
    side: 'L',
    length: 38, tipR: 5, baseR: 8,
    angle: 0.9, angleRest: 0.9, angleUp: -0.4,
    angVel: 0, state: 'rest',
    pressed: false,
  };
}
flippers.miniL = makeMiniFlipperL();

function flipperTip(f){
  return { x: f.pivot.x + Math.cos(f.angle)*f.length, y: f.pivot.y + Math.sin(f.angle)*f.length };
}

function flipperStep(dt){
  for (const f of [flippers.L, flippers.R, flippers.miniL].filter(Boolean)){
    const target = f.pressed ? f.angleUp : f.angleRest;
    const delta = target - f.angle;
    const maxSpeed = f.pressed ? 18 : 10;  // rad/s
    const step = Math.sign(delta) * Math.min(Math.abs(delta), maxSpeed * dt);
    f.angVel = dt > 0 ? step / dt : 0;
    f.angle += step;
  }
}

function flipperCollide(f, p0, d, r){
  const tip = flipperTip(f);
  // Overlap rescue: flipper may sweep into a (near-)stationary ball between substeps.
  // Detect penetration of the swept-radius capsule and report a toi=0 hit so the
  // surface-velocity kick branch can resolve it.
  const ax = tip.x - f.pivot.x, ay = tip.y - f.pivot.y;
  const segLen2 = ax*ax + ay*ay;
  let tParam = ((p0.x - f.pivot.x)*ax + (p0.y - f.pivot.y)*ay) / segLen2;
  tParam = Math.max(0, Math.min(1, tParam));
  const cx = f.pivot.x + ax*tParam, cy = f.pivot.y + ay*tParam;
  const dx = p0.x - cx, dy = p0.y - cy;
  const dist = Math.hypot(dx, dy);
  const radSum = r + (tParam < 0.5 ? f.baseR : f.tipR);
  if (dist < radSum - 1e-3){
    const arm = { x: cx - f.pivot.x, y: cy - f.pivot.y };
    const vSurf = { x: -arm.y * f.angVel, y: arm.x * f.angVel };
    const vmag = Math.hypot(vSurf.x, vSurf.y);
    let nx, ny;
    if (vmag > 1e-3){ nx = vSurf.x / vmag; ny = vSurf.y / vmag; }
    else { const nl = dist || 1; nx = dx/nl; ny = dy/nl; }
    return { toi: 0, normal: { x: nx, y: ny }, flipper: f, penetration: (radSum - dist) + 0.5 };
  }
  const seg = sweepCircleSegment(p0, d, r + f.tipR, f.pivot, tip);
  const ca = sweepCircleEnd(p0, d, r + f.baseR, f.pivot);
  const cb = sweepCircleEnd(p0, d, r + f.tipR, tip);
  let best = null;
  for (const h of [seg, ca, cb]) if (h && (!best || h.toi < best.toi)) best = h;
  if (!best) return null;
  return { ...best, flipper: f };
}

// ============ 6. PLUNGER ============
const plunger = { charge:0, charging:false, maxImpulse: 1100, chargeRate: 1.0 };
function plungerCharge(dt){ plunger.charge = clamp(plunger.charge + plunger.chargeRate*dt, 0, 1); }
function plungerRelease(){
  if (ball.p.x > SHOOTER_X && ball.p.y > 600){
    ball.v.y = -plunger.charge * plunger.maxImpulse;
    state.ballWasLaunched = true;
    state.saverUntil = performance.now()/1000 + 5;
  }
  plunger.charge = 0;
}
function plungerStep(dt){
  if (input.plunge) plungerCharge(dt);
  else if (plunger.charge > 0) plungerRelease();
}

const input = { L:false, R:false, plunge:false };
window.addEventListener('keydown', e=>{
  if (settings.soundEnabled){
    try {
      const a = getAudioContext();
      if (a.state === 'suspended') a.resume();
    } catch {}
  }

  if (e.key === 'Escape'){
    if (menu.open) closeMenuAndResume();
    else openMenu();
    return;
  }

  if (menu.open){
    if (e.key === '1') applyThemeFromMenu('sunburst-classic');
    if (e.key === '2') applyThemeFromMenu('cosmic-wedge');
    if (e.key === '3') applyThemeFromMenu('volcano-pop');
    if (e.key === '4') applyGameplayModeFromMenu('top-lanes');
    if (e.key === '5') applyGameplayModeFromMenu('drop-bank');
    if (e.key === '6') applyGameplayModeFromMenu('spell-neon');
    if (e.key === '7') applyGameplayModeFromMenu('bumper-frenzy');
    if (e.key === 's' || e.key === 'S') applySoundFromMenu(!settings.soundEnabled);
    if (e.key === 'Enter') closeMenuAndResume();
    return;
  }

  if (e.key === ' ' && state.phase === 'gameover'){ restartGame(); return; }
  if (e.key==='z' || e.key==='Z' || e.key==='ArrowLeft') input.L = true;
  if (e.key==='/' || e.key==='ArrowRight') input.R = true;
  if (e.key===' ') input.plunge = true;
  if (e.key==='p' || e.key==='P') paused = !paused;
});
window.addEventListener('keyup', e=>{
  if (e.key==='z' || e.key==='Z' || e.key==='ArrowLeft') input.L = false;
  if (e.key==='/' || e.key==='ArrowRight') input.R = false;
  if (e.key===' ') input.plunge = false;
});

// ============ 8b. FX ============
const trail = [];
const particles = [];
const floatTexts = []; // {text,x,y,vx,vy,life,maxLife,color}
const lightEffects = []; // {x,y,color,life,maxLife,size,type,phase}
let shake = 0;
let ac = null;
let audioPlayCount = 0;

function getAudioContext(){
  if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
  return ac;
}

function playThemeSound(type){
  if (!settings.soundEnabled) return;
  const theme = getActiveTheme();
  const s = theme.audio[type];
  if (!s) return;
  try {
    const a = getAudioContext();
    const osc = a.createOscillator();
    const gain = a.createGain();
    osc.type = s.wave;
    osc.frequency.value = s.freq;
    gain.gain.value = s.gain;
    osc.connect(gain);
    gain.connect(a.destination);
    const t0 = a.currentTime;
    osc.start(t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + s.dur);
    osc.stop(t0 + s.dur);
    audioPlayCount += 1;
  } catch {
    // Audio may be unavailable in some environments (tests/headless); ignore.
  }
}

function enqueueLightEffect(type, payload={}){
  const theme = getActiveTheme();
  const recipe = theme.lights[type];
  if (!recipe) return;
  if (lightEffects.length > 96) lightEffects.shift();
  lightEffects.push({
    x: payload.x ?? CONFIG.W/2,
    y: payload.y ?? CONFIG.H/2,
    color: recipe.color,
    life: recipe.life,
    maxLife: recipe.life,
    size: recipe.size,
    type: recipe.type,
    phase: 0,
  });
}

function dispatchThemeEvent(type, payload={}){
  enqueueLightEffect(type, payload);
  playThemeSound(type);
}

function updateLightEffects(dt){
  for (let i = lightEffects.length - 1; i >= 0; i--){
    const e = lightEffects[i];
    e.life -= dt;
    e.phase += dt * 12;
    if (e.life <= 0) lightEffects.splice(i, 1);
  }
}

function renderLightEffects(){
  for (const e of lightEffects){
    const a = Math.max(0, e.life / e.maxLife);
    const pulse = e.type === 'strobeBurst' ? (Math.sin(e.phase * 8) > 0 ? 1 : 0.45) : 1;
    const r = e.size * (1 + (1 - a) * 0.9);
    ctx.save();
    ctx.globalAlpha = a * 0.45 * pulse;
    ctx.shadowColor = e.color;
    ctx.shadowBlur = 22;
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function spawnFloat(text, x, y, color='#fc4'){
  floatTexts.push({text, x, y, vx:(Math.random()-0.5)*40, vy:-80, life:1.4, maxLife:1.4, color});
}
function spawnParticles(x, y, n, color){
  for (let i = 0; i < n; i++){
    const a = Math.random() * Math.PI * 2;
    const s = 80 + Math.random() * 160;
    particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      life: 0.4 + Math.random() * 0.3,
      color,
    });
  }
}

// ============ 9. RENDER ============
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function drawTopLanes(modeAccent){
  const lanes = topLaneList;
  if (!lanes.length) return;
  const theme = getActiveTheme();
  const palette = theme.palette;
  const litColor = modeAccent || palette.bumperGlow;
  const totalW = 345; // xEnd - xStart = 355 - 10
  const laneW = totalW / lanes.length;
  const xStart = 10;
  const yTop = 24;
  const yBot = 50;

  ctx.save();
  ctx.lineWidth = 1;

  for (let i = 0; i < lanes.length; i++){
    const lane = lanes[i];
    const lx = xStart + i * laneW;
    const cx = lx + laneW / 2;

    // Lane divider (left edge of each lane)
    ctx.strokeStyle = lane.lit ? litColor : palette.lane;
    ctx.shadowColor = lane.lit ? litColor : 'transparent';
    ctx.shadowBlur = lane.lit ? 6 : 0;
    ctx.beginPath();
    ctx.moveTo(lx, yTop);
    ctx.lineTo(lx, yBot);
    ctx.stroke();

    // Lane label — show label text if defined, else lane number
    const labelText = lane.label != null ? lane.label : String(i + 1);
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = lane.lit ? litColor : palette.textPrimary;
    ctx.shadowColor = lane.lit ? litColor : 'transparent';
    ctx.shadowBlur = lane.lit ? 4 : 0;
    ctx.fillText(labelText, cx, yBot - 4);
  }

  // Right edge of last lane — matches last lane's lit state
  const lastX = xStart + lanes.length * laneW;
  const lastLane = lanes[lanes.length - 1];
  ctx.strokeStyle = lastLane.lit ? litColor : palette.lane;
  ctx.shadowColor = lastLane.lit ? litColor : 'transparent';
  ctx.shadowBlur = lastLane.lit ? 6 : 0;
  ctx.beginPath();
  ctx.moveTo(lastX, yTop);
  ctx.lineTo(lastX, yBot);
  ctx.stroke();

  ctx.restore();
}

function render(){
  const dtRender = 1/60;
  const nowSec = performance.now()/1000;
  const superBumpers = bumperSuperActive(nowSec);
  const theme = getActiveTheme();
  const palette = theme.palette;
  const modeAccent = getActiveMode().accentColor || palette.bumperGlow;
  updateLightEffects(dtRender);
  trail.push({ x: ball.p.x, y: ball.p.y });
  if (trail.length > 12) trail.shift();
  for (let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    p.vy += 200 * dtRender;
    p.x += p.vx * dtRender;
    p.y += p.vy * dtRender;
    p.life -= dtRender;
    if (p.life <= 0) particles.splice(i, 1);
  }
  if (shake > 0) shake = Math.max(0, shake - dtRender * 30);

  ctx.fillStyle = palette.bg;
  ctx.fillRect(0,0,CONFIG.W,CONFIG.H);
  ctx.save();
  if (shake > 0){
    ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
  }
  // Walls (segments)
  ctx.lineCap = 'round';
  for (const s of segments){
    if (s.enabled === false) continue;
    if (s.kind === 'sling') continue; // rendered separately below
    ctx.strokeStyle = palette.lane;
    ctx.shadowColor = palette.insertOn;
    ctx.shadowBlur = 8;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(s.a.x, s.a.y);
    ctx.lineTo(s.b.x, s.b.y);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
  // Arcs (outlane guides)
  for (const ar of arcRegistry){
    ctx.strokeStyle = palette.lane;
    ctx.shadowColor = palette.insertOn;
    ctx.shadowBlur = 8;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(ar.c.x, ar.c.y, ar.R, ar.a0, ar.a1);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
  // Drain gap label — this is an OPENING in the floor, not a wall.
  ctx.fillStyle = 'rgba(255, 80, 110, 0.85)';
  ctx.font = 'bold 11px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('▼ DRAIN ▼', (DRAIN_LEFT + DRAIN_RIGHT) / 2, CONFIG.H - 2);
  for (const f of [flippers.L, flippers.R, flippers.miniL].filter(Boolean)){
    const tip = flipperTip(f);
    ctx.strokeStyle = '#fd5';
    ctx.lineCap = 'round';
    ctx.lineWidth = f === flippers.miniL ? 8 : 14;
    ctx.beginPath(); ctx.moveTo(f.pivot.x,f.pivot.y); ctx.lineTo(tip.x,tip.y); ctx.stroke();
  }
  for (const bp of bumperList){
    // Expanding ring when recently hit so the player clearly sees the bumper fire.
    if (bp.flash > 0){
      const t = 1 - (bp.flash / 0.45); // 0..1 over the flash lifetime
      ctx.save();
      ctx.globalAlpha = 1 - t;
      ctx.strokeStyle = palette.insertOn;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(bp.c.x, bp.c.y, bp.r + t * 22, 0, 2*Math.PI);
      ctx.stroke();
      ctx.restore();
    }
    if (superBumpers){
      const pulse = 0.5 + 0.5*Math.sin(performance.now()/120 + bp.c.x*0.02);
      ctx.save();
      ctx.globalAlpha = 0.22 + pulse * 0.2;
      ctx.strokeStyle = palette.bumperGlow;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(bp.c.x, bp.c.y, bp.r + 8 + pulse * 8, 0, 2*Math.PI);
      ctx.stroke();
      ctx.restore();
    }
    ctx.fillStyle = bp.flash > 0 ? '#fff' : (superBumpers ? palette.insertOn : modeAccent);
    ctx.shadowColor = superBumpers ? palette.insertOn : modeAccent;
    ctx.shadowBlur = bp.flash > 0 ? 24 : (superBumpers ? 20 : 12);
    ctx.beginPath(); ctx.arc(bp.c.x, bp.c.y, bp.r, 0, 2*Math.PI); ctx.fill();
    ctx.shadowBlur = 0;
    // Show the per-bumper hit counter so the player sees these have a purpose.
    ctx.fillStyle = bp.flash > 0 ? '#06283c' : '#06283c';
    ctx.font = 'bold 14px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(bp.hits), bp.c.x, bp.c.y + 1);
    bp.flash = Math.max(0, bp.flash - 1/60);
  }
   drawTopLanes(modeAccent);
  for (const sl of slingList){
    ctx.strokeStyle = sl.flash > 0 ? '#fff' : palette.slingGlow;
    ctx.lineWidth = 6; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(sl.a.x, sl.a.y); ctx.lineTo(sl.b.x, sl.b.y); ctx.stroke();
    sl.flash = Math.max(0, sl.flash - 1/60);
  }
  for (const dp of dropList){
    if (dp.down) continue;
    ctx.fillStyle = modeAccent;
    ctx.shadowColor = modeAccent; ctx.shadowBlur = 4;
    ctx.fillRect(dp.c.x - dp.w/2, dp.c.y - dp.h/2, dp.w, dp.h);
    ctx.shadowBlur = 0;
  }
  for (let i = 0; i < trail.length; i++){
    const t = trail[i];
    const a = i / trail.length;
    ctx.fillStyle = `rgba(255,255,255,${a*0.25})`;
    ctx.beginPath(); ctx.arc(t.x, t.y, ball.r * a, 0, Math.PI*2); ctx.fill();
  }
  const grad = ctx.createRadialGradient(ball.p.x, ball.p.y, 0, ball.p.x, ball.p.y, ball.r*2.5);
  grad.addColorStop(0, 'rgba(255,255,255,0.8)');
  grad.addColorStop(0.4, 'rgba(140,220,255,0.4)');
  grad.addColorStop(1, 'rgba(140,220,255,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(ball.p.x, ball.p.y, ball.r*2.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(ball.p.x, ball.p.y, ball.r, 0, Math.PI*2); ctx.fill();
  for (const p of particles){
    ctx.globalAlpha = Math.max(0, p.life*2);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
  }
  renderLightEffects();
  // Floating score/event texts
  for (let i = floatTexts.length - 1; i >= 0; i--){
    const ft = floatTexts[i];
    ft.x += ft.vx * dtRender;
    ft.y += ft.vy * dtRender;
    ft.life -= dtRender;
    if (ft.life <= 0){ floatTexts.splice(i, 1); continue; }
    const fa = Math.min(1, ft.life / (ft.maxLife * 0.35));
    ctx.globalAlpha = fa;
    ctx.shadowColor = ft.color;
    ctx.shadowBlur = 8;
    ctx.fillStyle = ft.color;
    ctx.font = "bold 11px 'Press Start 2P', monospace";
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'start';
  ctx.restore();

  // HUD panels keep text readable against rails/walls and avoid top-right crowding.
  ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
  ctx.fillRect(6, 6, 248, 96);
  ctx.fillRect(300, 6, 114, 82);

  ctx.fillStyle = palette.textAccent;
  ctx.font = "10px 'Press Start 2P', monospace";
  ctx.fillText('NEON PINBALL', 8, 16);
  ctx.fillStyle = palette.textPrimary;
  ctx.fillText('SCORE ' + state.score.toString().padStart(7,'0'), 8, 34);
  ctx.fillText('BALLS ' + state.balls, 8, 48);
  if (state.dropCycles > 0){
    ctx.fillStyle = palette.insertOn;
    ctx.fillText('BNK x' + state.dropCycles, 8, 62);
  }
  const hudRightX = 364;
  ctx.textAlign = 'right';
  ctx.fillStyle = state.mult > 1 ? palette.insertOn : '#888';
  ctx.fillText('MULT x' + state.mult, hudRightX, 34);
  if (state.saverUntil > nowSec){
    ctx.fillStyle = '#5f5';
    ctx.fillText('SAVER', hudRightX, 48);
  }
  if (state.kickback){
    ctx.fillStyle = palette.bumperGlow;
    ctx.shadowColor = palette.bumperGlow; ctx.shadowBlur = 6;
    ctx.fillText('KBCK', hudRightX, 62);
    ctx.shadowBlur = 0;
  } else if (state.kickbackFlash > 0){
    ctx.globalAlpha = state.kickbackFlash / 0.8;
    ctx.fillStyle = palette.bumperGlow;
    ctx.fillText('KBCK', hudRightX, 62);
    ctx.globalAlpha = 1;
    state.kickbackFlash = Math.max(0, state.kickbackFlash - 1/60);
  }
  // Right kickback indicator
  if (state.rightKickback){
    ctx.fillStyle = palette.bumperGlow;
    ctx.shadowColor = palette.bumperGlow; ctx.shadowBlur = 6;
    ctx.fillText('R-KB', hudRightX, 76);
    ctx.shadowBlur = 0;
  } else if (state.rightKickbackFlash > 0){
    ctx.globalAlpha = state.rightKickbackFlash / 0.8;
    ctx.fillStyle = palette.bumperGlow;
    ctx.fillText('R-KB', hudRightX, 76);
    ctx.globalAlpha = 1;
    state.rightKickbackFlash = Math.max(0, state.rightKickbackFlash - 1/60);
  }
  if (superBumpers){
    ctx.fillStyle = palette.bumperGlow;
    ctx.textAlign = 'center';
    ctx.shadowColor = palette.bumperGlow;
    ctx.shadowBlur = 8;
    ctx.fillText('SUPER BUMPERS', CONFIG.W/2, 64);
    ctx.shadowBlur = 0;
    ctx.textAlign = 'start';
  }
  if (state.phase === 'gameover'){
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, CONFIG.H/2 - 40, CONFIG.W, 80);
    ctx.fillStyle = '#f5a';
    ctx.font = "16px 'Press Start 2P', monospace";
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', CONFIG.W/2, CONFIG.H/2);
    ctx.font = "10px 'Press Start 2P', monospace";
    ctx.fillStyle = '#fff';
    ctx.fillText('PRESS SPACE', CONFIG.W/2, CONFIG.H/2 + 24);
    ctx.textAlign = 'start';
  }

  ctx.fillStyle = palette.textAccent;
  ctx.font = "8px 'Press Start 2P', monospace";
  ctx.textAlign = 'start';
  ctx.fillText(theme.name.toUpperCase(), 8, 76);
  ctx.fillText(getActiveMode().name.toUpperCase(), 8, 90);

  const cabinetHint = getCabinetMenuIndicatorText();
  const hintY = CONFIG.H - 24;
  ctx.fillStyle = palette.textPrimary;
  ctx.font = "7px 'Press Start 2P', monospace";
  ctx.textAlign = 'center';
  const hintWidth = ctx.measureText(cabinetHint).width;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect((CONFIG.W - hintWidth) / 2 - 6, hintY - 9, hintWidth + 12, 12);
  ctx.fillStyle = palette.textPrimary;
  ctx.fillText(cabinetHint, CONFIG.W/2, hintY);
  ctx.textAlign = 'start';

  renderMenuOverlay();
}

function renderMenuOverlay(){
  if (!menu.open) return;
  const t = getActiveTheme();
  const p = t.palette;
  const controlLines = getCabinetMenuControlLines();
  const ruleLines = getCabinetMenuRuleLines();
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(20, 80, CONFIG.W - 40, 480);
  ctx.strokeStyle = p.textAccent;
  ctx.lineWidth = 2;
  ctx.strokeRect(20, 80, CONFIG.W - 40, 480);
  ctx.fillStyle = p.textPrimary;
  ctx.font = "10px 'Press Start 2P', monospace";
  ctx.textAlign = 'center';
  ctx.fillText('CABINET MENU', CONFIG.W/2, 114);
  ctx.textAlign = 'left';
  // Themes
  ctx.fillStyle = p.textAccent;
  ctx.fillText('THEMES', 50, 140);
  ctx.fillStyle = p.textPrimary;
  ctx.fillText('1 SUNBURST CLASSIC', 50, 160);
  ctx.fillText('2 COSMIC WEDGE', 50, 180);
  ctx.fillText('3 VOLCANO POP', 50, 200);
  // Modes
  ctx.fillStyle = p.textAccent;
  ctx.fillText('MODES', 50, 226);
  ctx.fillStyle = p.textPrimary;
  ctx.fillText('4 TOP LANES', 50, 246);
  ctx.fillText('5 DROP BANK', 50, 264);
  ctx.fillText('6 SPELL NEON', 50, 282);
  ctx.fillText('7 BUMPER FRENZY', 50, 300);
  // Sound
  ctx.fillText('S SOUND: ' + (settings.soundEnabled ? 'ON' : 'OFF'), 50, 322);
  // Controls
  ctx.fillStyle = p.textAccent;
  ctx.fillText('PLAY CONTROLS', 50, 348);
  ctx.fillStyle = p.textPrimary;
  ctx.font = "8px 'Press Start 2P', monospace";
  ctx.fillText(controlLines[0], 50, 368);
  ctx.fillText(controlLines[1], 50, 386);
  ctx.fillText(controlLines[2], 50, 404);
  // Rules
  ctx.fillStyle = p.textAccent;
  ctx.font = "10px 'Press Start 2P', monospace";
  ctx.fillText('GAME RULES', 50, 428);
  ctx.fillStyle = p.textPrimary;
  ctx.font = "8px 'Press Start 2P', monospace";
  ctx.fillText(ruleLines[0], 50, 448);
  ctx.fillText(ruleLines[1], 50, 464);
  // Footer
  ctx.font = "10px 'Press Start 2P', monospace";
  ctx.fillText('ENTER APPLY/RESUME', 50, 488);
  ctx.fillText('ESC CANCEL/RESUME', 50, 506);
  ctx.textAlign = 'center';
  ctx.fillText('THEME: ' + t.name.toUpperCase(), CONFIG.W/2, 530);
  ctx.fillText('MODE: ' + getActiveMode().name.toUpperCase(), CONFIG.W/2, 550);
  ctx.textAlign = 'start';
}

// ============ 10. LOOP ============
let paused = false;
let last = performance.now();
let acc = 0;
function frame(now){
  const dt = Math.min(0.1, (now - last)/1000);
  last = now;
  if (!paused){
    acc += dt;
    let steps = 0;
    while (acc >= CONFIG.FIXED_DT && steps < CONFIG.MAX_SUBSTEPS){
      physicsStep(CONFIG.FIXED_DT);
      acc -= CONFIG.FIXED_DT;
      steps++;
    }
    if (acc > CONFIG.MAX_SUBSTEPS * CONFIG.FIXED_DT) acc = 0;
    plungerStep(dt);
  }
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ============ 11. TEST HOOK ============
const emitThemeEvent = dispatchThemeEvent;
window.__test = {
  get ball(){ return ball; },
  get state(){ return state; },
  get bumpers(){ return bumperList; },
  get topLanes(){ return topLaneList; },
  get drops(){ return dropList; },
  CONFIG,
  step(n=1){ for(let i=0;i<n*CONFIG.MAX_SUBSTEPS;i++) physicsStep(CONFIG.FIXED_DT); render(); },
  pause(){ paused = true; },
  resume(){ paused = false; },
  place(x,y,vx=0,vy=0){ ball.p={x,y}; ball.v={x:vx,y:vy}; },
  press(key){ const e = new KeyboardEvent('keydown',{key}); window.dispatchEvent(e); },
  release(key){ const e = new KeyboardEvent('keyup',{key}); window.dispatchEvent(e); },
  _math: { sweepCircleSegment, sweepCircleEnd, sweepCircleArc },
  _addTempFloor(x1,y1,x2,y2){ addSegment({x:x1,y:y1},{x:x2,y:y2}); },
  plungerCharge(amount){ plunger.charge = clamp(amount, 0, 1); },
  plungerRelease(){ plungerRelease(); },
  restart(){ restartGame(); },
  openMenu(){ openMenu(); },
  closeMenuAndResume(){ closeMenuAndResume(); },
  isMenuOpen(){ return menu.open; },
  getCabinetMenuHint(){ return getCabinetMenuIndicatorText(); },
  getCabinetMenuControls(){ return getCabinetMenuControlLines(); },
  getCabinetMenuRules(){ return getCabinetMenuRuleLines(); },
  setThemeFromMenu(id){ return applyThemeFromMenu(id); },
  setSoundFromMenu(enabled){ return applySoundFromMenu(enabled); },
  getThemeId(){ return settings.themeId; },
  isSoundEnabled(){ return settings.soundEnabled; },
  getGameplayModeId(){ return settings.gameplayModeId; },
  setGameplayModeFromMenu(id){ return applyGameplayModeFromMenu(id); },
  get miniLFlipper(){ return flippers.miniL; },
  addScore(points){ applyScore(points); },
  forcePhase(phase){ state.phase = phase; },
  dispatchThemeEvent(type, payload){ emitThemeEvent(type, payload); },
  getActiveLightEffectCount(){ return lightEffects.length; },
  getAudioPlayCount(){ return audioPlayCount; },
};
